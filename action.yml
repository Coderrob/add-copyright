author: Robert Lindley
name: Copyright and License
description: |
  Adds copyright headers and license texts to source files using SPDX, supporting 750+ licenses.

branding:
  color: yellow
  icon: lock

inputs:
  name:
    description: "Name of the copyright holder"
    required: true

  license:
    description: "License type (any current SPDX license identifier, e.g., MIT, Apache-2.0, GPL-3.0-only, BSD-3-Clause)"
    required: true

  working-directory:
    default: "."
    description: "Directory to scan for source files"
    required: false

runs:
  using: "composite"
  steps:
    - name: Checkout Repository
      id: checkout-repository
      uses: actions/checkout@v2

    - name: Ensure Script Permission
      id: ensure-executable
      shell: bash
      run: chmod +x "${{ github.action_path }}/scripts/copyright.sh"

    - name: Execute Copyright Update
      id: execute-update
      shell: bash
      run: |
        "${{ github.action_path }}/scripts/copyright.sh" \
        "${{ inputs.working-directory }}" \
        "${{ inputs.license }}" \
        "${{ inputs.name }}"
